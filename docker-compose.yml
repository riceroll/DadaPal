services:
  postgres:
    image: postgres:16-alpine
    container_name: dadapal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dadapal
      POSTGRES_USER: dadapal
      POSTGRES_PASSWORD: dadapal
    ports:
      - "5432:5432"
    volumes:
      - dadapal-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dadapal -d dadapal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dadapal-redis
    restart: unless-stopped
    profiles: ["future"]
    ports:
      - "6379:6379"

volumes:
  dadapal-postgres: